*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #2d5a3d;
  --green-dark: #1e3d2a;
  --card-bg: rgba(247, 246, 242, 0.72);
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #9bb0bb;
}

/* ══════════════════════════════
   ENVELOPE SCREEN
══════════════════════════════ */
#envelope-screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 60% 40%, #2d5a3d 0%, #1a3328 50%, #0f1f16 100%);
  z-index: 20;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#envelope-screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.05); }

.envelope-wrap {
  width: min(85vw, 400px);
  aspect-ratio: 3/4;
  cursor: pointer;
  filter: drop-shadow(0 40px 80px rgba(0,0,0,0.6));
  transition: transform 0.3s ease;
}
.envelope-wrap:hover  { transform: scale(1.015) translateY(-4px); }
.envelope-wrap:active { transform: scale(0.995); }
.envelope-img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; display: block; }

.click-hint {
  margin-top: 24px;
  font-family: 'Libre Baskerville', serif;
  font-size: 10px; letter-spacing: 3px; color: #c9a96e;
  opacity: 0;
  animation: fadeHint 2s ease 1.2s forwards, pulseHint 3s ease 3.2s infinite;
}
@keyframes fadeHint  { to { opacity: 0.75; } }
@keyframes pulseHint { 0%,100%{opacity:0.75} 50%{opacity:0.3} }

/* ══════════════════════════════
   INVITE SCREEN
══════════════════════════════ */
#invite-screen {
  display: none;
  position: fixed; inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#invite-screen.visible { display: block; }

.invite-page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  /* Shift card upward ~8% of viewport height so couple's heads stay clear */
  padding: 0 16px 0;
  margin-top: -8vh;
}

/* ── CARD ── */
.invite-card {
  width: min(92vw, 440px);
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 6px;
  padding: clamp(20px, 3.5vh, 36px) 24px clamp(20px, 3.5vh, 36px);
  text-align: center;
  box-shadow: 0 8px 48px rgba(0,0,0,0.22);
}

.names-script {
  font-family: 'AmsterdamFour', cursive;
  font-size: 53px;
  line-height: 1.1;
  color: var(--green-dark);
  white-space: nowrap;
  display: block;
  width: 100%;
  padding: 4px 0 clamp(10px, 2.5vh, 22px);
  opacity: 0; animation: fadeUp 0.9s ease 0.3s forwards;
}

.tagline {
  font-family: 'Libre Baskerville', serif;
  font-size: clamp(12px, 1.8vh, 14px);
  color: var(--green-dark);
  line-height: 1.6;
  opacity: 0; animation: fadeUp 0.9s ease 0.5s forwards;
}

.divider {
  display: flex; align-items: center; justify-content: center;
  gap: 10px;
  margin: clamp(8px, 1.5vh, 13px) 0;
  opacity: 0; animation: fadeUp 0.9s ease 0.7s forwards;
}
.div-line   { flex: 1; height: 1px; background: var(--green-dark); opacity: 0.3; max-width: 70px; }
.div-hearts { color: var(--green-dark); font-size: 10px; opacity: 0.55; letter-spacing: 4px; }

.info-date {
  font-family: 'Libre Baskerville', serif;
  font-size: clamp(12px, 1.8vh, 14px);
  color: var(--green-dark);
  line-height: 1.7;
  opacity: 0; animation: fadeUp 0.9s ease 0.9s forwards;
}

.info-location {
  font-family: 'Libre Baskerville', serif;
  font-size: clamp(12px, 1.8vh, 14px);
  color: var(--green-dark);
  line-height: 1.7;
  opacity: 0; animation: fadeUp 0.9s ease 1.1s forwards;
}

.buttons-row {
  display: flex;
  gap: 8px;
  margin-top: clamp(14px, 2.5vh, 22px);
  opacity: 0; animation: fadeUp 0.9s ease 1.3s forwards;
}

.btn-card {
  flex: 1;
  display: flex; flex-direction: column; align-items: center;
  gap: 6px;
  padding: clamp(12px, 2vh, 18px) 6px clamp(10px, 1.8vh, 16px);
  background: rgba(255,255,255,0.58);
  border: 1px solid rgba(45,90,61,0.18);
  border-radius: 4px;
  text-decoration: none;
  transition: all 0.25s ease;
}
.btn-card:hover  { background: var(--green-dark); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(30,61,42,0.25); }
.btn-card:hover .btn-icon  { color: #c9a96e; }
.btn-card:hover .btn-label { color: white; }
.btn-icon  { color: var(--green); transition: color 0.25s; }
.btn-label {
  font-family: 'Libre Baskerville', serif;
  font-size: clamp(11px, 1.6vh, 13.8px);
  color: var(--green-dark);
  text-align: center; line-height: 1.35;
  transition: color 0.25s;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<script>
  var envBtn    = document.getElementById("envBtn");
  var envScreen = document.getElementById("envelope-screen");
  var invScreen = document.getElementById("invite-screen");
  var namesEl   = document.getElementById("namesScript");
  var card      = document.getElementById("inviteCard");

  function fitNames() {
    if (!namesEl || !card) return;
    var inner = card.clientWidth - 48;
    var lo = 18, hi = 56, best = 18;
    for (var i = 0; i < 24; i++) {
      var mid = (lo + hi) / 2;
      namesEl.style.fontSize = mid + "px";
      if (namesEl.scrollWidth <= inner) { best = mid; lo = mid; }
      else { hi = mid; }
    }
    namesEl.style.fontSize = best + "px";
  }

  function openInvite() {
    envScreen.classList.add("hidden");
    invScreen.classList.add("visible");
    invScreen.scrollTop = 0;
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(fitNames);
    } else {
      setTimeout(fitNames, 300);
    }
  }

  envBtn.addEventListener("click", openInvite);
  envBtn.addEventListener("keydown", function(e) {
    if (e.key === "Enter" || e.key === " ") openInvite();
  });
  window.addEventListener("resize", fitNames);
</script>
